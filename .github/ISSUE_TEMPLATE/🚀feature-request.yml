name: 🚀 Feature request
description: Suggest an idea for this project
title: "[Feature] "
labels: ['Feature']

body:
- type: textarea
  attributes:
    label: Motivation
    description: |
      A clear and concise description of what the motivation is.
    placeholder: I'm always frustrated when [...]
  validations:
    required: true
- type: textarea
  attributes:
    label: Describe the solution you'd like
    description: |
      You can provide a clear and concise description of what you want to have.
- type: textarea
  attributes:
    label: Related resources
    description: |
      Provide existing implementations or related materials if available.
