name: Format and Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # Linting & Formatting
  quality:
    name: Code Quality (Pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pre-commit hooks
        run: SKIP=no-commit-to-branch uv run pre-commit run --all-files --show-diff-on-failure

  # Build Images and Do Unit Tests
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    needs: quality

    env:
      PYTHONPATH: src
      RUN_OPENCODE_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      # 1. Set Docker Buildx to use the buildkit driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. install uv and Python environment
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Unit Tests
        run: uv run pytest -v tests/unit -m "not slow"

      - name: Run Integration Tests (VCR replay)
        run: uv run pytest -v tests/integration -m "integration"
